name: Build Web-to-App APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout original beta code
        uses: actions/checkout@v4
        with:
          repository: shiahonb777/web-to-app
          ref: v2.0.0.beta.b

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK Licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Fix Empty File Path Bug
        run: |
          # 1. Inject dummy variables to satisfy keystore requirements
          echo "storeFile=." >> local.properties
          echo "KEYSTORE_FILE=." >> local.properties
          echo "RELEASE_STORE_FILE=." >> local.properties
          echo "storeFile=." >> gradle.properties
          echo "KEYSTORE_FILE=." >> gradle.properties
          echo "RELEASE_STORE_FILE=." >> gradle.properties
          
          # 2. Fix literal empty file calls if they exist in the code
          sed -i "s/file(\"\")/file(\".\")/g" app/build.gradle.kts
          sed -i "s/file('')/file('.')/g" app/build.gradle.kts
          
          # 3. Print the file to the logs so we can see Line 25 if it crashes again!
          echo "=== APP BUILD.GRADLE.KTS CONTENT ==="
          cat app/build.gradle.kts

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"
          STORE_FILE: "."
          KEYSTORE_FILE: "."
          KEYSTORE: "."

      - name: Upload APK
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: web-to-app-apk
          path: app/build/outputs/apk/debug/*.apk
