name: Build Web-to-App APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout original beta code
        uses: actions/checkout@v4
        with:
          repository: shiahonb777/web-to-app
          ref: v2.0.0.beta.b

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: The Bulletproof Keystore Fix
        run: |
          # 1. Create a real dummy keystore file so Android doesn't crash
          keytool -genkey -v -keystore release.jks -keyalg RSA -keysize 2048 -validity 1000 -alias dummy -storepass password -keypass password -dname "CN=Dummy"
          
          # 2. Get the absolute path of the file we just made
          KS_PATH="$(pwd)/release.jks"
          
          # 3. Force every common variable to point to our new file
          echo "storeFile=$KS_PATH" >> gradle.properties
          echo "KEYSTORE_FILE=$KS_PATH" >> gradle.properties
          echo "RELEASE_STORE_FILE=$KS_PATH" >> gradle.properties
          
          # 4. Physically edit the Kotlin code to replace blank paths with our new file
          sed -i "s|file(\"\")|file(\"$KS_PATH\")|g" app/build.gradle.kts
          sed -i "s|file('')|file('$KS_PATH')|g" app/build.gradle.kts

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"

      - name: Upload APK
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: web-to-app-apk
          path: app/build/outputs/apk/debug/*.apk
