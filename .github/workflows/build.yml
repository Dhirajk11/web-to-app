name: Build Web-to-App APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout original beta code
        uses: actions/checkout@v4
        with:
          repository: shiahonb777/web-to-app
          ref: v2.0.0.beta.b

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK Licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g" # Gives Gradle 4GB of RAM so it doesn't crash

      - name: Upload APK
        if: always() # Ensures it uploads whatever it can even if it partially fails
        uses: actions/upload-artifact@v4
        with:
          name: web-to-app-apk
          path: app/build/outputs/apk/debug/*.apk
          
